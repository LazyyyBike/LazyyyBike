<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport meta tag is crucial for mobile games to prevent zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            overflow: hidden; /* Prevent scrolling */
            touch-action: none; /* Disable default touch gestures */
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let touches pass through to canvas */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #0ff;
        }

        .screen {
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border: 2px solid #0ff;
            border-radius: 10px;
            pointer-events: auto; /* Re-enable clicks for buttons */
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        h1 {
            color: #0ff;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        p {
            color: #ddd;
            margin-bottom: 20px;
        }

        button {
            background: #0ff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
        }

        button:active {
            background: #fff;
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="score-board">Score: 0</div>

    <div id="ui-layer">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1>Neon Dash</h1>
            <p>Tap to move.<br>Avoid the Red Blocks.</p>
            <button id="start-btn">Start Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1 style="color: #f00;">Game Over</h1>
            <p id="final-score">Score: 0</p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        //
